name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Testes automatizados (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Aplicar migrações
        env:
          SECRET_KEY: django-insecure-ci-key-nao-usar-em-producao
          LLM_API_KEY: sk-test-dummy-key-para-ci
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: python manage.py migrate --no-input

      - name: Executar testes com cobertura
        env:
          SECRET_KEY: django-insecure-ci-key-nao-usar-em-producao
          LLM_API_KEY: sk-test-dummy-key-para-ci
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          pytest \
            --cov=chat \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

  frontend-test:
    name: Testes frontend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes Vitest
        run: npm test
